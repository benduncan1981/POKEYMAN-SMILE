<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=390, height=844, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> <title>Pokeyman Smile</title> <style> body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }

#game {
position: relative;
width: 390px;
height: 844px;
overflow: hidden;
background: black;
}

img {
position: absolute;
user-select: none;
-webkit-user-drag: none;
transition: all 0.3s ease;
}

.center {
left: 50%;
transform: translateX(-50%);
}

#timer {
position: absolute;
top: 10px;
right: 10px;
color: white;
font-size: 24px;
z-index: 10;
}

#countdown {
position: absolute;
top: 40%;
width: 100%;
text-align: center;
font-size: 64px;
color: white;
z-index: 20;
}

#rewardText {
position: absolute;
bottom: 100px;
width: 100%;
text-align: center;
color: white;
font-size: 24px;
}
</style>

</head> <body> <div id="game"> <!-- TITLE --> <img id="titleScreen" src="TITLE SCREEN.png" style="width:100%; height:100%;"> <!-- MAIN GAME --> <img id="background" src="BACKGROUND.png" style="width:100%; height:100%; display:none;"> <img id="bennochu" src="BENNOCHU BRUSHING.png" style="width:120px; bottom:150px; left:135px; display:none;"> <img id="bennoText" src="BENNOCHU APPEARS TEXT.png" style="width:200px; top:120px; left:95px; display:none;"> <img id="hand" src="poking hand.png" style="width:80px; display:none;"> <!-- UI --> <img id="startBtn" src="START.png" style="width:100px; bottom:20px; left:20px; display:none;"> <img id="pauseBtn" src="PAUSE.png" style="width:100px; bottom:20px; left:145px; display:none;"> <img id="resetBtn" src="RESET.png" style="width:100px; bottom:20px; right:20px; display:none;"> <div id="timer">2:00</div> <div id="countdown"></div> <!-- REWARD --> <img id="chest" src="CHEST UNOPENED.png" style="width:200px; top:300px; left:95px; display:none;"> <div id="rewardText"></div> </div> <script> let timer = 120; let timerInterval, moveInterval, handInterval, countdownInterval; let paused = false; let chestOpened = false; const title = document.getElementById("titleScreen"); const bg = document.getElementById("background"); const benno = document.getElementById("bennochu"); const hand = document.getElementById("hand"); const startBtn = document.getElementById("startBtn"); const pauseBtn = document.getElementById("pauseBtn"); const resetBtn = document.getElementById("resetBtn"); const timerEl = document.getElementById("timer"); const countdownEl = document.getElementById("countdown"); const chest = document.getElementById("chest"); const rewardText = document.getElementById("rewardText"); const bennoText = document.getElementById("bennoText"); title.onclick = () => { title.style.display = "none"; showGame(); }; function showGame() { bg.style.display = "block"; benno.style.display = "block"; hand.style.display = "block"; startBtn.style.display = "block"; pauseBtn.style.display = "block"; resetBtn.style.display = "block"; bennoText.style.display = "block"; resetPositions(); } function resetPositions() { benno.style.left = "135px"; benno.style.bottom = "150px"; hand.style.left = "50px"; hand.style.top = "500px"; } startBtn.onclick = () => { if (timerInterval) return; startCountdown(); }; pauseBtn.onclick = () => { paused = !paused; }; resetBtn.onclick = resetGame; function startCountdown() { let count = 5; countdownEl.innerText = count; countdownInterval = setInterval(() => { count--; countdownEl.innerText = count; if (count <= 0) { clearInterval(countdownInterval); countdownEl.innerText = ""; startGame(); } }, 1000); } function startGame() { timerInterval = setInterval(() => { if (paused) return; timer--; updateTimer(); if (timer <= 0) endGame(); }, 1000); moveInterval = setInterval(moveBenno, 600); handInterval = setInterval(moveHand, 600); } function updateTimer() { let m = Math.floor(timer / 60); let s = timer % 60; timerEl.innerText = m + ":" + (s < 10 ? "0" : "") + s; } function moveBenno() { if (paused) return; let x = Math.random() * 270; let y = Math.random() * 250; benno.style.left = x + "px"; benno.style.bottom = (150 + y) + "px"; } function moveHand() { if (paused) return; let bx = benno.offsetLeft; let by = benno.offsetTop; hand.style.left = (bx + Math.random() * 40) + "px"; hand.style.top = (by + Math.random() * 40) + "px"; } function endGame() { clearInterval(timerInterval); clearInterval(moveInterval); clearInterval(handInterval); benno.src = "BENNOCHU CLEAN.png"; setTimeout(showReward, 1500); } function showReward() { bg.style.display = "none"; benno.style.display = "none"; hand.style.display = "none"; startBtn.style.display = "none"; pauseBtn.style.display = "none"; resetBtn.style.display = "none"; timerEl.style.display = "none"; bennoText.style.display = "none"; chest.style.display = "block"; rewardText.innerText = "Tap the chest!"; } chest.onclick = () => { if (!chestOpened) { chest.src = "CHEST OPENED.png"; rewardText.innerText = "Well done!"; chestOpened = true; } else { location.reload(); } }; function resetGame() { clearInterval(timerInterval); clearInterval(moveInterval); clearInterval(handInterval); clearInterval(countdownInterval); timer = 120; updateTimer(); paused = false; benno.src = "BENNOCHU BRUSHING.png"; resetPositions(); } </script> </body> </html>
